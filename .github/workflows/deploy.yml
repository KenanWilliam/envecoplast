name: Build & Deploy to Spaceship

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy static assets into standalone
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Deploy to Spaceship via rsync
        env:
          SSH_PASSPHRASE: ${{ secrets.SPACESHIP_SSH_PASSPHRASE }}
        run: |
          # Setup SSH directory and key
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'KEYEOF'
          ${{ secrets.SPACESHIP_SSH_KEY }}
          KEYEOF
          chmod 600 ~/.ssh/deploy_key

          # Start ssh-agent and add key
          eval "$(ssh-agent -s)"
          echo "$SSH_PASSPHRASE" | ssh-add ~/.ssh/deploy_key

          # Add host to known_hosts
          ssh-keyscan -p ${{ secrets.SPACESHIP_SSH_PORT }} ${{ secrets.SPACESHIP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          # Deploy via rsync
          echo "🚀 Starting rsync deployment..."
          rsync -avz --delete -e "ssh -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no" \
            .next/standalone/ ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }}:${{ secrets.SPACESHIP_APP_PATH }}/

          # Cleanup
          rm -f ~/.ssh/deploy_key
          ssh-agent -k

      - name: Restart Node.js app
        env:
          SSH_PASSPHRASE: ${{ secrets.SPACESHIP_SSH_PASSPHRASE }}
        run: |
          # Setup SSH directory and key
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'KEYEOF'
          ${{ secrets.SPACESHIP_SSH_KEY }}
          KEYEOF
          chmod 600 ~/.ssh/deploy_key

          # Start ssh-agent and add key
          eval "$(ssh-agent -s)"
          echo "$SSH_PASSPHRASE" | ssh-add ~/.ssh/deploy_key

          # Add host to known_hosts
          ssh-keyscan -p ${{ secrets.SPACESHIP_SSH_PORT }} ${{ secrets.SPACESHIP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          # SSH and restart app
          echo "🔄 Restarting Node.js app..."
          ssh -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }} << 'EOF'
          mkdir -p ${{ secrets.SPACESHIP_APP_PATH }}/tmp
          touch ${{ secrets.SPACESHIP_APP_PATH }}/tmp/restart.txt
          EOF

          # Cleanup
          rm -f ~/.ssh/deploy_key
          ssh-agent -k
