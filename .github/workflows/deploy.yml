name: Build & Deploy to Spaceship

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deployment package
        run: |
          # Copy static assets into standalone
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

          # Rename server.js to app.js within standalone for cPanel
          mv .next/standalone/server.js .next/standalone/app.js
          chmod 755 .next/standalone/app.js

          # Inject the correct absolute path into .htaccess
          sed -i "s|REPLACE_ME_APP_ROOT|${{ secrets.SPACESHIP_APP_PATH }}|g" .htaccess
          
          # Copy package.json for reference
          cp package.json .next/standalone/package.json

          # Copy .htaccess to standalone root
          cp .htaccess .next/standalone/.htaccess

      - name: Deploy to Spaceship via rsync
        env:
          SSH_PASSPHRASE: ${{ secrets.SPACESHIP_SSH_PASSPHRASE }}
        run: |
          # Setup SSH directory and key
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'KEYEOF'
          ${{ secrets.SPACESHIP_SSH_KEY }}
          KEYEOF
          chmod 600 ~/.ssh/deploy_key

          # Start ssh-agent and add key
          eval "$(ssh-agent -s)"
          echo "$SSH_PASSPHRASE" | ssh-add ~/.ssh/deploy_key

          # Add host to known_hosts
          ssh-keyscan -p ${{ secrets.SPACESHIP_SSH_PORT }} ${{ secrets.SPACESHIP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          # AGGRESSIVE CLEANUP: Remove cPanel default files and conflicting folders
          echo "🧹 Cleaning up potential conflicting files and folders..."
          ssh -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }} << 'EOF'
          # Use relative paths from home directory to avoid hardcoded usernames
          cd ~
          ROOT_DIR=$(dirname ${{ secrets.SPACESHIP_APP_PATH }})
          
          rm -f ${{ secrets.SPACESHIP_APP_PATH }}/index.html ${{ secrets.SPACESHIP_APP_PATH }}/index.php
          rm -f $ROOT_DIR/public_html/index.html $ROOT_DIR/public_html/index.php
          rm -f $ROOT_DIR/public_html/default.php $ROOT_DIR/public_html/DefaultHome.php
          
          # Force delete old .next folders
          rm -rf ${{ secrets.SPACESHIP_APP_PATH }}/.next
          
          # CloudLinux demands node_modules be a symlink
          rm -rf ${{ secrets.SPACESHIP_APP_PATH }}/node_modules
          EOF

          # Deploy via rsync (excluding .git and node_modules)
          echo "🚀 Starting rsync deployment..."
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.gitignore' \
            --exclude '.env*' \
            --exclude 'README.md' \
            --exclude 'node_modules' \
            -e "ssh -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no" \
            .next/standalone/ ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }}:${{ secrets.SPACESHIP_APP_PATH }}/

          # CRITICAL: Copy .htaccess to public_html so Apache finds the app
          ssh -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }} << 'EOF'
          ROOT_DIR=$(dirname ${{ secrets.SPACESHIP_APP_PATH }})
          cp ${{ secrets.SPACESHIP_APP_PATH }}/.htaccess $ROOT_DIR/public_html/.htaccess
          chmod 644 $ROOT_DIR/public_html/.htaccess
          EOF

          # Cleanup
          rm -f ~/.ssh/deploy_key
          ssh-agent -k

      - name: Restart Node.js app
        env:
          SSH_PASSPHRASE: ${{ secrets.SPACESHIP_SSH_PASSPHRASE }}
        run: |
          # Setup SSH directory and key
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'KEYEOF'
          ${{ secrets.SPACESHIP_SSH_KEY }}
          KEYEOF
          chmod 600 ~/.ssh/deploy_key

          # Start ssh-agent and add key
          eval "$(ssh-agent -s)"
          echo "$SSH_PASSPHRASE" | ssh-add ~/.ssh/deploy_key

          # Add host to known_hosts
          ssh-keyscan -p ${{ secrets.SPACESHIP_SSH_PORT }} ${{ secrets.SPACESHIP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          # SSH and restart app using cPanel's Node.js app manager
          echo "🔄 Restarting Node.js app..."
          ssh -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }} << 'EOF'
          # Clear the tmp folder to force a clean restart
          rm -rf ${{ secrets.SPACESHIP_APP_PATH }}/tmp/*
          mkdir -p ${{ secrets.SPACESHIP_APP_PATH }}/tmp
          touch ${{ secrets.SPACESHIP_APP_PATH }}/tmp/restart.txt
          
          # Force clean public_html again just in case
          ROOT_DIR=$(dirname ${{ secrets.SPACESHIP_APP_PATH }})
          rm -f $ROOT_DIR/public_html/index.html
          rm -f $ROOT_DIR/public_html/index.php
          
          echo "✅ App restart initiated"
          EOF

          # Cleanup
          rm -f ~/.ssh/deploy_key
          ssh-agent -k
