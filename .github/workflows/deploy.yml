name: Build & Deploy to Spaceship

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deployment package
        run: |
          # Copy static assets into standalone
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

          # Rename server.js to app.js (The primary startup file)
          mv .next/standalone/server.js .next/standalone/app.js
          
          # Add shebang and basic env setup to app.js
          echo "#!/usr/bin/env node" > .next/standalone/temp_app.js
          echo "process.env.PORT = process.env.PORT || 3000;" >> .next/standalone/temp_app.js
          cat .next/standalone/app.js >> .next/standalone/temp_app.js
          mv .next/standalone/temp_app.js .next/standalone/app.js
          
          chmod 755 .next/standalone/app.js

          # Inject the correct absolute path into .htaccess
          sed -i "s|REPLACE_ME_APP_ROOT|${{ secrets.SPACESHIP_APP_PATH }}|g" .htaccess
          
          # Copy .htaccess to standalone root
          cp .htaccess .next/standalone/.htaccess

      - name: Deploy to Spaceship via rsync
        env:
          SSH_PASSPHRASE: ${{ secrets.SPACESHIP_SSH_PASSPHRASE }}
        run: |
          # Setup SSH directory and key
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'KEYEOF'
          ${{ secrets.SPACESHIP_SSH_KEY }}
          KEYEOF
          chmod 600 ~/.ssh/deploy_key

          # Start ssh-agent and add key
          eval "$(ssh-agent -s)"
          echo "$SSH_PASSPHRASE" | ssh-add ~/.ssh/deploy_key

          # Add host to known_hosts
          ssh-keyscan -p ${{ secrets.SPACESHIP_SSH_PORT }} ${{ secrets.SPACESHIP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          # AGGRESSIVE CLEANUP & PERMISSIONS: Fix 403 issues at the source
          echo "🧹 Cleaning up and fixing permissions..."
          ssh -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }} << 'EOF'
          # CRITICAL: Fix home directory permissions so Apache can enter
          chmod 711 ~
          
          # Remove conflicting index files in app path and public_html
          rm -f ${{ secrets.SPACESHIP_APP_PATH }}/index.html ${{ secrets.SPACESHIP_APP_PATH }}/index.php
          rm -f ~/public_html/index.html ~/public_html/index.php
          rm -f ~/public_html/default.php ~/public_html/DefaultHome.php
          
          # Force delete old .next folders
          rm -rf ${{ secrets.SPACESHIP_APP_PATH }}/.next
          EOF

          # Deploy via rsync
          echo "🚀 Starting rsync deployment..."
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.gitignore' \
            --exclude '.env*' \
            --exclude 'README.md' \
            -e "ssh -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no" \
            .next/standalone/ ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }}:${{ secrets.SPACESHIP_APP_PATH }}/

          # FINAL CONFIG: Setup permissions and symlinks
          echo "⚙️ Finalizing server configuration..."
          ssh -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }} << 'EOF'
          # Ensure directories and scripts are accessible/executable
          chmod 755 ${{ secrets.SPACESHIP_APP_PATH }}
          chmod 755 ${{ secrets.SPACESHIP_APP_PATH }}/app.js
          
          # Copy .htaccess to public_html as the main entry point
          cp ${{ secrets.SPACESHIP_APP_PATH }}/.htaccess ~/public_html/.htaccess
          chmod 644 ~/public_html/.htaccess
          
          # Create symlinks for static assets in public_html
          mkdir -p ~/public_html/_next
          ln -sfn ${{ secrets.SPACESHIP_APP_PATH }}/.next/static ~/public_html/_next/static
          ln -sfn ${{ secrets.SPACESHIP_APP_PATH }}/public ~/public_html/public
          
          # Also symlink app.js and node_modules if public_html is the document root
          ln -sfn ${{ secrets.SPACESHIP_APP_PATH }}/app.js ~/public_html/app.js
          ln -sfn ${{ secrets.SPACESHIP_APP_PATH }}/node_modules ~/public_html/node_modules
          EOF

          # Cleanup
          rm -f ~/.ssh/deploy_key
          ssh-agent -k

      - name: Restart Node.js app
        env:
          SSH_PASSPHRASE: ${{ secrets.SPACESHIP_SSH_PASSPHRASE }}
        run: |
          # Setup SSH directory and key
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'KEYEOF'
          ${{ secrets.SPACESHIP_SSH_KEY }}
          KEYEOF
          chmod 600 ~/.ssh/deploy_key

          # Start ssh-agent and add key
          eval "$(ssh-agent -s)"
          echo "$SSH_PASSPHRASE" | ssh-add ~/.ssh/deploy_key

          # Add host to known_hosts
          ssh-keyscan -p ${{ secrets.SPACESHIP_SSH_PORT }} ${{ secrets.SPACESHIP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          # SSH and restart app using cPanel's Node.js app manager
          echo "🔄 Restarting Node.js app..."
          ssh -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }} << 'EOF'
          # Clear the tmp folder to force a clean restart
          rm -rf ${{ secrets.SPACESHIP_APP_PATH }}/tmp/*
          mkdir -p ${{ secrets.SPACESHIP_APP_PATH }}/tmp
          touch ${{ secrets.SPACESHIP_APP_PATH }}/tmp/restart.txt
          
          # Force clean public_html again just in case
          ROOT_DIR=$(dirname ${{ secrets.SPACESHIP_APP_PATH }})
          rm -f $ROOT_DIR/public_html/index.html
          rm -f $ROOT_DIR/public_html/index.php
          
          echo "✅ App restart initiated"
          EOF

          # Cleanup
          rm -f ~/.ssh/deploy_key
          ssh-agent -k
