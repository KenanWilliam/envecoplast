name: Build & Deploy to Spaceship

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy static assets into standalone
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Deploy to Spaceship via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: .next/standalone/
          remote_path: ${{ secrets.SPACESHIP_APP_PATH }}
          remote_host: ${{ secrets.SPACESHIP_HOST }}
          remote_port: ${{ secrets.SPACESHIP_SSH_PORT }}
          remote_user: ${{ secrets.SPACESHIP_USERNAME }}
          remote_key: ${{ secrets.SPACESHIP_SSH_KEY }}

      - name: Restart Node.js app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SPACESHIP_HOST }}
          port: ${{ secrets.SPACESHIP_SSH_PORT }}
          username: ${{ secrets.SPACESHIP_USERNAME }}
          key: ${{ secrets.SPACESHIP_SSH_KEY }}
          passphrase: ${{ secrets.SPACESHIP_SSH_PASSPHRASE }}
          script: |
            mkdir -p ${{ secrets.SPACESHIP_APP_PATH }}/tmp
            touch ${{ secrets.SPACESHIP_APP_PATH }}/tmp/restart.txt
