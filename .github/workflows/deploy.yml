name: Deploy to Spaceship

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r .next/standalone/* deploy/
          cp -r .next/static deploy/.next/
          cp -r public deploy/
          cp server.js deploy/
          cp package.json deploy/
          cp package-lock.json deploy/

      - name: Setup SSH, Deploy, and Restart
        env:
          DEPLOY_KEY: ${{ secrets.SPACESHIP_SSH_KEY }}
          SSH_PASSPHRASE: ${{ secrets.SPACESHIP_SSH_PASSPHRASE }}
        run: |
          # Setup SSH directory and key
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'KEYEOF'
          ${{ secrets.SPACESHIP_SSH_KEY }}
          KEYEOF
          chmod 600 ~/.ssh/deploy_key

          # Start ssh-agent and add key
          eval "$(ssh-agent -s)"
          echo "$SSH_PASSPHRASE" | ssh-add ~/.ssh/deploy_key

          # Add host to known_hosts
          ssh-keyscan -p ${{ secrets.SPACESHIP_SSH_PORT }} ${{ secrets.SPACESHIP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          # Deploy via rsync
          echo "🚀 Starting rsync deployment..."
          rsync -avz --delete -e "ssh -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./deploy/ ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }}:${{ secrets.SPACESHIP_APP_PATH }}/

          # SSH and restart app
          echo "🔄 Restarting Node.js app..."
          ssh -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }} << 'EOF'
          cd ${{ secrets.SPACESHIP_APP_PATH }}
          npm ci --production
          touch tmp/restart.txt
          EOF

          # Cleanup
          rm -f ~/.ssh/deploy_key
          ssh-agent -k

      - name: Deployment success
        run: echo "✅ Deployment to Spaceship completed successfully"
