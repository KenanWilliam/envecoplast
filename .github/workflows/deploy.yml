name: Deploy to Spaceship

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r .next/standalone/* deploy/
          cp -r .next/static deploy/.next/
          cp -r public deploy/
          cp server.js deploy/
          cp package.json deploy/
          cp package-lock.json deploy/

      - name: Deploy to Spaceship via rsync
        env:
          DEPLOY_KEY: ${{ secrets.SPACESHIP_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'KEYEOF'
          ${{ secrets.SPACESHIP_SSH_KEY }}
          KEYEOF
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SPACESHIP_SSH_PORT }} ${{ secrets.SPACESHIP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./deploy/ ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }}:${{ secrets.SPACESHIP_APP_PATH }}/
          rm -f ~/.ssh/deploy_key

      - name: Restart Node.js app on Spaceship
        env:
          DEPLOY_KEY: ${{ secrets.SPACESHIP_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'KEYEOF'
          ${{ secrets.SPACESHIP_SSH_KEY }}
          KEYEOF
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SPACESHIP_SSH_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SPACESHIP_USERNAME }}@${{ secrets.SPACESHIP_HOST }} << 'EOF'
          cd ${{ secrets.SPACESHIP_APP_PATH }}
          npm ci --production
          touch tmp/restart.txt
          EOF
          rm -f ~/.ssh/deploy_key

      - name: Deployment success
        run: echo "✅ Deployment to Spaceship completed successfully"
